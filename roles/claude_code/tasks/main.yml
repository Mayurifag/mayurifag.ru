---
- name: Download Claude Code installer
  ansible.builtin.get_url:
    url: https://claude.ai/install.sh
    dest: /tmp/claude-install.sh
    mode: "0755"
    force: true

- name: Install Claude Code CLI for admin user
  ansible.builtin.command: /tmp/claude-install.sh
  become: true
  become_user: "{{ admin_username }}"
  changed_when: true

- name: Remove Claude Code installer
  ansible.builtin.file:
    path: /tmp/claude-install.sh
    state: absent
