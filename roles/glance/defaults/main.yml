---
glance_enabled: true
glance_subdomain: "rss"
glance_image: "glanceapp/glance:latest"
glance_memory: "256m"
glance_data_directory: "{{ docker_home }}/glance"

# Get a GitHub token at https://github.com/settings/tokens (no scopes needed for public repos)
glance_github_token: "change_this_github_token"

# Get a GitHub token with notifications scope for github-notifications widget
glance_github_notifications_token: "change_this_github_notifications_token"

# City name — coords resolved via Open-Meteo geocoding at deploy time. "City, Country" format works.
glance_location_name: "Moscow, Russia"

# Get a free Finnhub token at https://finnhub.io/register (60 req/min free tier)
glance_finnhub_token: "change_this_finnhub_token"

glance_twitch_channels:
  - SilverName
  - HoneyMad

# Tech YouTube channel IDs (default: Marques Brownlee / MKBHD)
glance_tech_youtube_channels:
  - UCBJycsmduvYEL83R_U4JriQ

# Optional widget lists — set to [] to hide widget
glance_games_youtube_channels: []
glance_github_releases_repos: []
glance_reddit_subreddits: []
