---
- name: Discover Glance page templates
  ansible.builtin.set_fact:
    glance_pages: "{{ query('fileglob', role_path ~ '/templates/pages/*.yml.j2') | map('basename') | map('regex_replace', '\\.yml\\.j2$', '') | sort }}"

- name: Geocode Glance location to lat/lon
  ansible.builtin.uri:
    url: "https://geocoding-api.open-meteo.com/v1/search?name={{ glance_location_name | urlencode }}&count=1&format=json"
    return_content: true
  register: glance_geocode_result

- name: Set Glance lat/lon facts from geocode result
  ansible.builtin.set_fact:
    glance_latitude: "{{ glance_geocode_result.json.results[0].latitude }}"
    glance_longitude: "{{ glance_geocode_result.json.results[0].longitude }}"
  when: glance_geocode_result.json.results | default([]) | length > 0

- name: Fail if location could not be geocoded
  ansible.builtin.fail:
    msg: "Could not geocode glance_location_name='{{ glance_location_name }}'. Set a valid city name."
  when: glance_geocode_result.json.results | default([]) | length == 0

- name: Remove Glance data directory for clean deployment
  ansible.builtin.file:
    path: "{{ glance_data_directory }}"
    state: absent

- name: Create Glance directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  with_items:
    - "{{ glance_data_directory }}"
    - "{{ glance_data_directory }}/config"
    - "{{ glance_data_directory }}/config/pages"

- name: Create Glance configuration
  ansible.builtin.template:
    src: glance.yml.j2
    dest: "{{ glance_data_directory }}/config/glance.yml"
    mode: "0644"

- name: Create Glance page configurations
  ansible.builtin.template:
    src: "pages/{{ item }}.yml.j2"
    dest: "{{ glance_data_directory }}/config/pages/{{ item }}.yml"
    mode: "0644"
  loop: "{{ glance_pages }}"

- name: Glance Docker Container
  community.docker.docker_container:
    name: glance
    image: "{{ glance_image }}"
    pull: true
    recreate: true
    restart_policy: unless-stopped
    memory: "{{ glance_memory }}"
    volumes:
      - "{{ glance_data_directory }}/config:/app/config"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    env:
      GITHUB_TOKEN: "{{ glance_github_token }}"
      GITHUB_NOTIFICATIONS_TOKEN: "{{ glance_github_notifications_token }}"
      FINNHUB_TOKEN: "{{ glance_finnhub_token }}"
    networks:
      - name: "web"
    labels:
      traefik.enable: "true"
      traefik.http.routers.glance.rule: "Host(`{{ glance_subdomain }}.{{ server_hostname }}`)"
      traefik.http.services.glance.loadbalancer.server.port: "8080"
      traefik.http.routers.glance.middlewares: "tinyauth@docker,secure-headers@file"
      com.centurylinklabs.watchtower.enable: "true"
